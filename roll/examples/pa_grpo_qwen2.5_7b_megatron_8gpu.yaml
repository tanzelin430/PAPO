hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "papo-qwen2.5-7B-base"
seed: 42
logging_dir: ./output/logs
output_dir: ./output

checkpoint_config:
  type: file_system
  output_dir: ./output/checkpoints/${exp_name}

track_with: wandb
tracker_kwargs:
  project: papo_roll
  notes: "PAPO Qwen2.5-7B-Base 8GPU Megatron"
  tags:
    - papo
    - grpo_dual

num_gpus_per_node: 8

max_steps: 1000
save_steps: 100
logging_steps: 1
eval_steps: 10
resume_from_checkpoint: false

# =================== PAPO config ===================
rollout_batch_size: 128
prompt_length: 2048
response_length: 8192

num_return_sequences_in_group: 8
ppo_epochs: 1
adv_estimator: "grpo_dual"
lambda_process: 1.0

# clip
reward_clip: 10
advantage_clip: 2.0

# normalize — grpo_dual handles normalization internally
norm_mean_type: ~
norm_std_type: ~

# KL
init_kl_coef: 0.0
use_kl_loss: false
enable_reference: false

# data mask
max_len_mask: true

# reward
add_token_level_kl: false

# advantage
whiten_advantages: false

# =================== Model ===================
pretrain: Qwen/Qwen2.5-7B
reward_pretrain: Qwen/Qwen2.5-7B

# =================== Validation ===================
validation:
  data_args:
    template: qwen2_5
    file_name:
      - data/math_benchmarks.jsonl
  generating_args:
    max_new_tokens: ${response_length}
    top_p: 0.6
    top_k: 50
    num_beams: 1
    temperature: 0.6
    num_return_sequences: 1

# =================== Actor Train (TP=2, DP=4) ===================
actor_train:
  model_args:
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 32
    warmup_steps: 20
    num_train_epochs: 50
  data_args:
    template: qwen2_5
    file_name:
      - data/math_deepmath_deal.jsonl
    domain_interleave_probs:
      math_rule: 1.0
    dataset_dir: data
    messages: messages
    interleave_probs: "1.0"
    preprocessing_num_workers: 16
  strategy_args:
    strategy_name: megatron_train
    strategy_config:
      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      use_distributed_optimizer: true
      recompute_granularity: full
  device_mapping: list(range(0,8))
  infer_batch_size: 2

# =================== Actor Infer (vLLM, TP=2) ===================
actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: ${response_length}
    top_p: 1.0
    top_k: 0
    num_beams: 1
    temperature: 1.0
    num_return_sequences: ${num_return_sequences_in_group}
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.4
      tensor_parallel_size: 2
      block_size: 16
      max_model_len: 12288
  device_mapping: list(range(0,8))
  infer_batch_size: 1

# =================== Reference (Megatron, TP=2) ===================
reference:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: megatron_infer
    strategy_config:
      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
  device_mapping: list(range(0,8))
  infer_batch_size: 2

# =================== Rewards ===================
rewards:
  math_rule:
    worker_cls: roll.pipeline.rlvr.rewards.math_rule_reward_worker.MathRuleRewardWorker
    model_args:
      model_name_or_path: ${reward_pretrain}
    data_args:
      template: qwen2_5
    tag_included: [deepmath_103k]
    world_size: 8
    infer_batch_size: 1
    # PAPO dual objective
    use_dual_objective: true
    prm_api_url: "<your-llm-as-a-judge-api>/v1"
    prm_api_key: "<your-api-key>"
    prm_model: "<your-model-name>"
